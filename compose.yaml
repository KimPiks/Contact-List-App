services:
  proxy:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - netpc.api
    command: >
      /bin/sh -c "apk add --no-cache curl &&
      nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  migrator:
    image: netpc.api 
    build:
      context: backend
      dockerfile: src/NetPC.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Encryption__Key: ${CONTACT_ENCRYPTION_KEY}
    entrypoint: [ "./efbundle" ]

  netpc.api:
    image: netpc.api
    build:
      context: backend
      dockerfile: src/NetPC.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: ${ASPNETCORE_HTTP_PORTS}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      JWT__Secret: ${JWT_SECRET_KEY}
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
      JWT__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
      JWT__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}
      Encryption__Key: ${CONTACT_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${ASPNETCORE_HTTP_PORTS}/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  netpc.frontend:
    image: netpc.frontend
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s


volumes:
  postgres_data:

